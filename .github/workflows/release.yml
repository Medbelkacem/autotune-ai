name: Release container images

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write
  id-token: write   # for cosign OIDC

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image:
          - { name: api,             context: ".", dockerfile: services/api/Dockerfile }
          - { name: analysis-worker, context: ".", dockerfile: services/analysis-worker/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:latest
          provenance: true
          sbom: true
      - name: Sign image (cosign, keyless)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ env.VERSION }}
