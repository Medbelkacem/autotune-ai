name: autotune-ai

x-common-env: &common-env
  APP_ENV: ${APP_ENV:-local}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SECRET_KEY: ${SECRET_KEY}
  DATABASE_URL: ${DATABASE_URL}
  TIMESCALE_URL: ${TIMESCALE_URL}
  REDIS_URL: ${REDIS_URL}
  RABBITMQ_URL: ${RABBITMQ_URL}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  QDRANT_URL: ${QDRANT_URL}
  NEO4J_URI: ${NEO4J_URI}
  NEO4J_USER: ${NEO4J_USER}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  ANTHROPIC_MODEL_REASONING: ${ANTHROPIC_MODEL_REASONING}
  ANTHROPIC_MODEL_ANALYSIS: ${ANTHROPIC_MODEL_ANALYSIS}
  ANTHROPIC_MODEL_ROUTING: ${ANTHROPIC_MODEL_ROUTING}
  EMBED_PROVIDER: ${EMBED_PROVIDER}
  VOYAGE_API_KEY: ${VOYAGE_API_KEY}
  EMBED_MODEL: ${EMBED_MODEL}
  JWT_ISSUER: ${JWT_ISSUER}
  JWT_AUDIENCE: ${JWT_AUDIENCE}
  JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS}
  JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
  PASSWORD_PEPPER: ${PASSWORD_PEPPER}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotune -d autotune"]
      interval: 5s
      timeout: 3s
      retries: 20

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: autotune
      POSTGRES_PASSWORD: autotune
      POSTGRES_DB: telemetry
    volumes:
      - ts_data:/var/lib/postgresql/data
    ports: ["5433:5432"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis_data:/data]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: autotune
      RABBITMQ_DEFAULT_PASS: autotune
    ports: ["5672:5672", "15672:15672"]
    volumes: [rabbit_data:/var/lib/rabbitmq]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrant_data:/qdrant/storage]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j_data:/data]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; do sleep 1; done;
      mc mb --ignore-existing local/${S3_BUCKET};
      mc anonymous set download local/${S3_BUCKET};
      exit 0;
      "

  api:
    build:
      context: ../../
      dockerfile: services/api/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_started }
    ports: ["8000:8000"]
    volumes:
      - ../../services/api:/app
      - ../../packages/shared-schemas/python:/packages/shared-schemas/python
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ../../
      dockerfile: services/analysis-worker/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_started }
      redis:    { condition: service_healthy }
    volumes:
      - ../../services/analysis-worker:/app
      - ../../packages/shared-schemas/python:/packages/shared-schemas/python
    command: ["celery", "-A", "worker.celery_app", "worker", "-l", "INFO", "-Q", "analysis,embedding,simulation"]

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on: [api]
    ports: ["3000:3000"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
    ports: ["4317:4317", "4318:4318"]

volumes:
  pg_data:
  ts_data:
  redis_data:
  rabbit_data:
  qdrant_data:
  neo4j_data:
  minio_data:
