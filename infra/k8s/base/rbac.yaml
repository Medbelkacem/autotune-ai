apiVersion: v1
kind: ServiceAccount
metadata: { name: autotune-api, namespace: autotune }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: autotune-worker, namespace: autotune }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: autotune-read, namespace: autotune }
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: autotune-read-api, namespace: autotune }
subjects:
  - { kind: ServiceAccount, name: autotune-api, namespace: autotune }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: autotune-read }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: autotune-read-worker, namespace: autotune }
subjects:
  - { kind: ServiceAccount, name: autotune-worker, namespace: autotune }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: autotune-read }
