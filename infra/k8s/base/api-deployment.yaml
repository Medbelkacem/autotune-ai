apiVersion: apps/v1
kind: Deployment
metadata:
  name: autotune-api
  namespace: autotune
  labels: { app: autotune-api }
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector: { matchLabels: { app: autotune-api } }
  template:
    metadata:
      labels: { app: autotune-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: autotune-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/autotune-ai/api:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000, name: http }]
          envFrom:
            - secretRef: { name: autotune-api-secrets }
            - configMapRef: { name: autotune-api-config }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 2,    memory: 2Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: autotune-api
  namespace: autotune
spec:
  type: ClusterIP
  selector: { app: autotune-api }
  ports:
    - { name: http, port: 80, targetPort: 8000 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autotune-api
  namespace: autotune
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autotune-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu,   target: { type: Utilization, averageUtilization: 60 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 75 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: autotune-api
  namespace: autotune
spec:
  minAvailable: 2
  selector: { matchLabels: { app: autotune-api } }
